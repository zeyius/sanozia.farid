[build]
  publish = "dist"
  command = "yarn build"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--production=false"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "yarn dev"
  port = 5173
  publish = "dist"

# Config for dev branch
[context.dev.environment]

# Configuration for prod (main branch)
[context.production.environment]
